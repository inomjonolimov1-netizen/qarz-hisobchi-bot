services:
  - type: web
    name: qarz-hisobchi-bot
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /tg-webhook
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_PATH
        value: tg-webhook
